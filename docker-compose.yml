services:
  custom-jupyterlab:
    build:
      context: ./custom_jupyterlab_image
      dockerfile: Dockerfile
    image: custom-jupyterlab:latest
    # This service just builds the image, doesn't run
    profiles: ["build-only"]

  custom-jupyterlab-admin:
    build:
      context: ./custom_jupyterlab_image
      dockerfile: Dockerfile.admin
    image: custom-jupyterlab-admin:latest
    # This service just builds the admin image, doesn't run
    profiles: ["build-only"]

  nginx:
    image: nginx:latest
    container_name: nginx-jh
    ports:
      - "4050:80"
    volumes:
      - "./default.conf:/etc/nginx/conf.d/default.conf"
      - "./public:/usr/share/nginx/html/public"
    restart: on-failure
    networks:
      - hedge-iot-network-jupyterhub
    depends_on:
      knowledge-engine:
        condition: service_healthy
    
  knowledge-engine:
    image: ghcr.io/tno/knowledge-engine/smart-connector:1.3.0
    container_name: ${KNOWLEDGE_ENGINE_CONTAINER_NAME}
    networks:
      - hedge-iot-network-jupyterhub
    ports:
      - "${KNOWLEDGE_ENGINE_PORT}:8280"
    environment:
      KE_RUNTIME_PORT: 8082
      KE_RUNTIME_EXPOSED_URL: ${KE_RUNTIME_EXPOSED_URL}
      KD_URL: https://${KE_USER}:${KE_PASS}@hedgeiot.knowledge-engine.eu/kd
    restart: on-failure
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  jh:
    build:
      context: .
      dockerfile: Dockerfile.jupyterhub
      args:
        JUPYTERHUB_VERSION: 5.3.0
    restart: always
    image: jupyterhub
    container_name: jupyterhub
    networks:
      - hedge-iot-network-jupyterhub
    volumes:
      # The JupyterHub configuration file
      - "./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro"
      # Bind Docker socket on the host so we can connect to the daemon from
      # within the container
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
      # Bind Docker volume on host for JupyterHub database and cookie secrets
      - "jupyterhub-data:/data"
    ports:
      - "9999:8000"
      - "8888:8888"
    environment:
      # This username will be a JupyterHub admin
      JUPYTERHUB_ADMIN: admin
      # All containers will join this network
      DOCKER_NETWORK_NAME: hedge-iot-network-jupyterhub
      # JupyterHub will spawn this Notebook image for users
      DOCKER_NOTEBOOK_IMAGE: custom-jupyterlab:latest
      # Notebook directory inside user image
      DOCKER_NOTEBOOK_DIR: /home/jovyan/work
      # Using this run command
      DOCKER_SPAWN_CMD: start-singleuser.sh
      # Project directory
      JUPYTERHUB_CWD: ${PWD}
    command: >
      jupyterhub -f /srv/jupyterhub/jupyterhub_config.py

  graphdb:
    image: ontotext/graphdb:10.7.0
    container_name: graphdb
    restart: always
    volumes:
      - "graphdb-data:/opt/graphdb/home"
    ports:
      - "7200:7200"
    networks:
      - hedge-iot-network-jupyterhub
    environment:
      graphdb.external-url: ${GRAPHDB_EXTERNAL_URL}


volumes:
  jupyterhub-data:
  graphdb-data:


networks:
  hedge-iot-network-jupyterhub:
    name: hedge-iot-network-jupyterhub
